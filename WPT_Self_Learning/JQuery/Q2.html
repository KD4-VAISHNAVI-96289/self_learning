<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data using jQuery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Student Record System
        </h1>

        <div class="card p-4 shadow">

            <div class="mb-3">

                <label class="form-label">
                    Student Name
                </label>

                <input type="text"
                    id="studentName"
                    class="form-control"
                    placeholder="Enter Student Name">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Student Course
                </label>

                <input type="text"
                    id="studentCourse"
                    class="form-control"
                    placeholder="Enter Student Course">

            </div>

            <button class="btn btn-primary"
                id="addBtn">

                Add Student
            </button>

        </div>

        <div class="mt-5">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Sr No</th>
                        <th>Student Name</th>
                        <th>Student Course</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
    <script>
        let count = 1;
        $("#addBtn").click(function () {
            let name =
                $("#studentName").val();

            let course =
                $("#studentCourse").val();

            if (name == "" || course == "") {
                alert("Please fill all fields");
                return;
            }
            $("#tableBody").append(`
                <tr>
                    <td>${count}</td>
                    <td>${name}</td>
                    <td>${course}</td>
                </tr>`);
            count++;
            $("#studentName").val("");

            $("#studentCourse").val("");

        });

    </script>

</body>

</html>
