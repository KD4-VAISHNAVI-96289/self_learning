<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>JSON Object and JSON Array Example</h1>

    <script>

        let book = {
            "bookName": "WPT",
            "author": " Rohan Paramane",
            "price": 499,
            "available": true
        };

        console.log("JSON Object:");
        console.log(book);

        let books = [
            {
                "bookName": "WPT",
                "author": "Rohan Paramane",
                "price": 499
            },
            {
                "bookName": "DBT",
                "author": "Nilesh Ghule",
                "price": 350
            },
            {
                "bookName": "CPP",
                "author": "Ketan Sir",
                "price": 299
            }
        ];

        console.log("JSON Array:");
        console.log(books);

    </script>

</body>
</html>
