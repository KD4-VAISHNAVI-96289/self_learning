<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Flex Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body style="background-color: #f0f0f0;">

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Bootstrap Flex Example
        </h1>

        <h3>1. d-flex (Row Direction Default)</h3>

        <div class="d-flex bg-light p-3 border mb-4">

            <div class="p-3 bg-primary text-white m-2">Box 1</div>

            <div class="p-3 bg-success text-white m-2">Box 2</div>

            <div class="p-3 bg-danger text-white m-2">Box 3</div>

        </div>

        <h3>2. justify-content-between</h3>

        <div class="d-flex justify-content-between bg-light p-3 border mb-4">

            <div class="p-3 bg-primary text-white">A</div>

            <div class="p-3 bg-success text-white">B</div>

            <div class="p-3 bg-danger text-white">C</div>

        </div>

        <h3>3. align-items-center</h3>

        <div class="d-flex align-items-center bg-light border mb-4"
            style="height: 150px;">

            <div class="p-3 bg-warning text-dark m-2">Item 1</div>

            <div class="p-3 bg-info text-white m-2">Item 2</div>

            <div class="p-3 bg-dark text-white m-2">Item 3</div>

        </div>

        <h3>4. flex-column</h3>

        <div class="d-flex flex-column bg-light p-3 border mb-4">

            <div class="p-3 bg-primary text-white m-2">Top</div>

            <div class="p-3 bg-success text-white m-2">Middle</div>

            <div class="p-3 bg-danger text-white m-2">Bottom</div>

        </div>

        <h3>5. flex-wrap</h3>

        <div class="d-flex flex-wrap bg-light p-3 border">

            <div class="p-3 bg-primary text-white m-2">1</div>

            <div class="p-3 bg-success text-white m-2">2</div>

            <div class="p-3 bg-danger text-white m-2">3</div>

            <div class="p-3 bg-warning text-dark m-2">4</div>

            <div class="p-3 bg-info text-white m-2">5</div>

            <div class="p-3 bg-dark text-white m-2">6</div>

        </div>

    </div>

</body>

</html>
